spring.application.name=OjtTracker

spring.datasource.url=jdbc:h2:file:./data/ojttracker
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

server.port=${PORT:8080}
app.cors.allowed-origin=${APP_CORS_ORIGIN:http://localhost:5173}

app.auth.token-secret=${AUTH_TOKEN_SECRET:local-dev-secret-change-me}
app.auth.token-ttl-days=${AUTH_TOKEN_TTL_DAYS:180}
app.auth.admin-pin=${ADMIN_PIN:0000}
app.auth.site-pin.junggye=${SITE_PIN_JUNGGYE:1111}
app.auth.site-pin.sangbong=${SITE_PIN_SANGBONG:2222}
app.auth.site-pin.banghak=${SITE_PIN_BANGHAK:3333}
app.auth.site-pin.suyu=${SITE_PIN_SUYU:4444}
app.auth.site-pin.mia=${SITE_PIN_MIA:5555}
